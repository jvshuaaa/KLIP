# Example Apache vhost (production) for Laravel
# Goal: ONLY expose the `public/` directory.
#
# Notes:
# - Enable required modules: rewrite, headers (and ssl for HTTPS)
# - Ensure AllowOverride is enabled so public/.htaccess works (or move rules here).

<VirtualHost *:80>
    ServerName example.com

    DocumentRoot /var/www/klip/public
    <Directory /var/www/klip/public>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    # Redirect HTTP -> HTTPS (enable after SSL is set up)
    # RewriteEngine On
    # RewriteCond %{HTTPS} !=on
    # RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# HTTPS example (requires certs)
# <VirtualHost *:443>
#     ServerName example.com
#     DocumentRoot /var/www/klip/public
#     SSLEngine on
#     SSLCertificateFile /etc/letsencrypt/live/example.com/fullchain.pem
#     SSLCertificateKeyFile /etc/letsencrypt/live/example.com/privkey.pem
# </VirtualHost>
