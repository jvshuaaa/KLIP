# Example Nginx server block (production) for Laravel
# Goal: ONLY expose the `public/` directory, disable listing, deny secrets,
# and add security headers at the edge.

server {
    listen 80;
    server_name example.com;

    root /var/www/klip/public;
    index index.php;

    # Disable directory listing
    autoindex off;

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }

    # Deny common sensitive extensions (extra hardening)
    location ~* \.(env|ini|log|bak|sql|sh|yml|yaml|toml|md|lock)$ {
        deny all;
    }

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    # Security headers (tune CSP to your frontend needs)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
}
